spring:
  application:
    name: "configserver"
  profiles:
    active: git
  cloud:
    config:
      server:
        git:
          uri: "https://github.com/mennaAllahSayedd/hrms-config-repo.git"
          default-label: main
          timeout: 5
          clone-on-start: true
          force-pull: true
          try-master-branch: false
management:
  endpoints:
    web:
      exposure:
        include: "*"
server:
  port: 8077


